<svg xmlns="http://www.w3.org/2000/svg" viewBox="7 6 52 52" fill="none">
    <style>
        @media (prefers-color-scheme: dark) {
        .solid,
        .soft,
        .dim,
        .outline {
        stroke: #f4f4f5;
        }

        .solid,
        .soft,
        .dim {
        fill: #a1a1aa;
        }
        }
    </style>

    <!-- top cube: half-filled from bottom -->
    <g transform="translate(21 18) rotate(-14) scale(1.35)" stroke-linejoin="round">
        <path class="outline" stroke-width="1.35" d="M0 -6L6 -3L0 0L-6 -3L0 -6Z" />
        <path class="dim" stroke-width="1.35" d="M-6 -3L0 0V7L-6 4V-3Z" />
        <path class="soft" stroke-width="1.35" d="M6 -3L0 0V7L6 4V-3Z" />
        <path class="highlight" d="M-2.4 1.2L-0.7 2L-1.8 3.8L-3.5 3L-2.4 1.2Z" />
    </g>

    <!-- right cube: full -->
    <g transform="translate(43 20) rotate(17) scale(1.15)" stroke-linejoin="round">
        <path class="solid" stroke-width="1.35" d="M0 -6L6 -3L0 0L-6 -3L0 -6Z" />
        <path class="dim" stroke-width="1.35" d="M-6 -3L0 0V7L-6 4V-3Z" />
        <path class="soft" stroke-width="1.35" d="M6 -3L0 0V7L6 4V-3Z" />
        <path class="highlight" d="M-2.4 -4.3L-0.7 -3.5L-1.8 -1.7L-3.5 -2.5L-2.4 -4.3Z" />
    </g>

    <!-- left-bottom cube: full -->
    <g transform="translate(19 40) rotate(9) scale(1.2)" stroke-linejoin="round">
        <path class="solid" stroke-width="1.35" d="M0 -6L6 -3L0 0L-6 -3L0 -6Z" />
        <path class="dim" stroke-width="1.35" d="M-6 -3L0 0V7L-6 4V-3Z" />
        <path class="soft" stroke-width="1.35" d="M6 -3L0 0V7L6 4V-3Z" />
        <path class="highlight" d="M-2.4 -4.3L-0.7 -3.5L-1.8 -1.7L-3.5 -2.5L-2.4 -4.3Z" />
    </g>

    <!-- bottom cube: half-filled from bottom -->
    <g transform="translate(43 43) rotate(-18) scale(1.3)" stroke-linejoin="round">
        <path class="outline" stroke-width="1.35" d="M0 -6L6 -3L0 0L-6 -3L0 -6Z" />
        <path class="dim" stroke-width="1.35" d="M-6 -3L0 0V7L-6 4V-3Z" />
        <path class="soft" stroke-width="1.35" d="M6 -3L0 0V7L6 4V-3Z" />
        <path class="highlight" d="M-2.4 1.2L-0.7 2L-1.8 3.8L-3.5 3L-2.4 1.2Z" />
    </g>
</svg>
